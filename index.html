<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>FitPlan</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitPlan">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23000'/%3E%3Ccircle cx='50' cy='50' r='34' fill='none' stroke='%2330d158' stroke-width='8'/%3E%3C/svg%3E">
<style>
:root{
  --bg:#000; --bg2:#1c1c1e; --bg3:#2c2c2e; --bg4:#3a3a3c;
  --label:#fff; --label2:rgba(235,235,245,0.60); --label3:rgba(235,235,245,0.30);
  --green:#30d158; --blue:#0a84ff; --orange:#ff9f0a; --red:#ff453a; --purple:#bf5af2;
  --fill:rgba(118,118,128,0.24);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--label);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",system-ui,sans-serif;
  overscroll-behavior:none; -webkit-font-smoothing:antialiased;
  padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
}
a{color:inherit;}
button{font-family:inherit;}

/* Header */
header.topbar{
  position:sticky; top:0; z-index:10;
  padding:calc(env(safe-area-inset-top) + 14px) 20px 14px;
  margin-top:calc(env(safe-area-inset-top) * -1);
  background:rgba(0,0,0,0.72); backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:0.5px solid rgba(255,255,255,0.08);
}
header.topbar h1{font-size:28px; font-weight:700; margin:0; letter-spacing:-0.02em;}
header.topbar .sub{font-size:13px; color:var(--label2); margin-top:2px;}

main{padding:16px 16px 100px; max-width:640px; margin:0 auto;}
.tab-panel{display:none;}
.tab-panel.active{display:block; animation:fadein .2s ease;}
@keyframes fadein{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

.card{
  background:var(--bg2); border-radius:18px; padding:18px; margin-bottom:14px;
}
.section-title{
  font-size:20px; font-weight:700; margin:22px 2px 10px; letter-spacing:-0.01em;
}
.section-title:first-child{margin-top:2px;}

/* Fasting ring */
.ring-card{display:flex; flex-direction:column; align-items:center; padding:26px 18px;}
.ring-wrap{position:relative; width:180px; height:180px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-bg{fill:none; stroke:var(--bg3); stroke-width:10;}
.ring-fg{fill:none; stroke:var(--green); stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 1s ease;}
.ring-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
.ring-center .big{font-size:30px; font-weight:700; letter-spacing:-0.02em;}
.ring-center .small{font-size:12px; color:var(--label2); margin-top:4px; max-width:130px;}
.ring-status{margin-top:16px; font-size:15px; font-weight:600;}
.ring-status.open{color:var(--green);}

/* Calendar strip */
.cal-strip{display:flex; gap:8px; overflow-x:auto; padding:2px 2px 6px; -ms-overflow-style:none; scrollbar-width:none;}
.cal-strip::-webkit-scrollbar{display:none;}
.cal-day{
  flex:0 0 auto; width:54px; padding:10px 0 8px; border-radius:14px; background:var(--bg2);
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.cal-day.today{background:var(--blue);}
.cal-day .dname{font-size:11px; color:var(--label2); text-transform:uppercase; font-weight:600;}
.cal-day.today .dname{color:rgba(255,255,255,0.8);}
.cal-day .dnum{font-size:17px; font-weight:700;}
.cal-tag{width:20px; height:5px; border-radius:3px;}
.tag-gym{background:var(--orange);}
.tag-run{background:var(--blue);}
.cal-day.today .tag-run{background:#fff;}
.tag-rest{background:var(--label3);}

/* Workout preview */
.wo-preview{display:flex; justify-content:space-between; align-items:center;}
.wo-preview .name{font-size:19px; font-weight:700;}
.wo-preview .muscles{font-size:13px; color:var(--label2); margin-top:2px;}
.chev{color:var(--label3); font-size:20px;}
.progress-bar{height:6px; background:var(--bg4); border-radius:3px; overflow:hidden; margin-top:14px;}
.progress-bar > div{height:100%; background:var(--green); border-radius:3px; transition:width .3s ease;}
.progress-label{font-size:12px; color:var(--label2); margin-top:8px;}

/* Macro stats */
.macro-row{display:flex; gap:10px;}
.macro-box{flex:1; background:var(--bg3); border-radius:14px; padding:14px; text-align:center;}
.macro-box .val{font-size:22px; font-weight:700;}
.macro-box .lbl{font-size:11px; color:var(--label2); margin-top:2px; text-transform:uppercase; letter-spacing:0.02em;}
.weight-tap{font-size:12px; color:var(--blue); margin-top:12px; text-align:center;}

/* Meal times */
.list-row{display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-bottom:0.5px solid rgba(255,255,255,0.08);}
.list-row:last-child{border-bottom:none;}
.list-row .t{color:var(--label2); font-size:14px; width:56px;}
.list-row .n{flex:1; font-size:15px; font-weight:500;}

/* Supplements */
.supp-row{display:flex; gap:10px;}
.supp-item{flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;}
.supp-circle{
  width:44px; height:44px; border-radius:50%; border:2px solid var(--bg4);
  display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:var(--label2);
  transition:all .15s ease;
}
.supp-circle.done{background:var(--green); border-color:var(--green); color:#fff;}
.supp-item .slbl{font-size:11px; color:var(--label2);}

/* Exercise list */
.ex-row{display:flex; align-items:center; gap:12px; padding:13px 2px; border-bottom:0.5px solid rgba(255,255,255,0.08);}
.ex-row:last-child{border-bottom:none;}
.ex-circle{
  width:26px; height:26px; border-radius:50%; border:2px solid var(--bg4); flex:0 0 auto;
  display:flex; align-items:center; justify-content:center;
}
.ex-circle.done{background:var(--green); border-color:var(--green);}
.ex-circle.done::after{content:'✓'; color:#fff; font-size:13px; font-weight:700;}
.ex-info{flex:1; min-width:0;}
.ex-info .en{font-size:16px; font-weight:600;}
.ex-info .es{font-size:13px; color:var(--label2); margin-top:1px;}
.ex-info .ew{font-size:12px; color:var(--blue); margin-top:2px; font-weight:600;}

/* Pills */
.pill-group{display:flex; flex-wrap:wrap; gap:8px;}
.pill{
  padding:8px 13px; border-radius:20px; background:var(--fill); font-size:14px; font-weight:500;
}
.pill.top{background:rgba(48,209,88,0.18); color:var(--green); font-weight:600;}
.pill.avoid{background:rgba(255,69,58,0.16); color:var(--red);}

/* Shopping list */
.shop-item{display:flex; align-items:center; gap:12px; padding:11px 2px; border-bottom:0.5px solid rgba(255,255,255,0.08);}
.shop-item:last-child{border-bottom:none;}
.shop-check{width:22px; height:22px; border-radius:7px; border:2px solid var(--bg4); flex:0 0 auto;}
.shop-check.done{background:var(--green); border-color:var(--green); position:relative;}
.shop-check.done::after{content:'✓'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:700;}
.shop-item .sn{font-size:15px; flex:1;}
.shop-item.done .sn{color:var(--label3); text-decoration:line-through;}
.shop-reset{width:100%; padding:12px; border-radius:14px; border:none; background:var(--bg3); color:var(--red); font-size:14px; font-weight:600; margin-top:4px;}

/* Meal ideas */
.meal-cat{margin-bottom:6px;}
.meal-cat h3{font-size:14px; color:var(--label2); font-weight:600; margin:0 0 2px; text-transform:uppercase; letter-spacing:0.02em;}
.meal-cat .hint{font-size:12px; color:var(--label3); margin-bottom:10px;}
.idea-row{display:flex; align-items:flex-start; gap:10px; padding:10px 2px; border-bottom:0.5px solid rgba(255,255,255,0.08);}
.idea-row:last-child{border-bottom:none;}
.idea-dot{width:6px; height:6px; border-radius:50%; background:var(--purple); margin-top:7px; flex:0 0 auto;}
.idea-row .it{font-size:15px; line-height:1.35;}

/* Bottom nav */
nav.bottomnav{
  position:fixed; left:0; right:0; bottom:0; z-index:20;
  display:flex; padding:8px 8px calc(env(safe-area-inset-bottom) + 6px);
  background:rgba(28,28,30,0.78); backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-top:0.5px solid rgba(255,255,255,0.08);
}
nav.bottomnav button{
  flex:1; background:none; border:none; color:var(--label3); display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:6px 0 2px; font-size:10px; font-weight:600;
}
nav.bottomnav button svg{width:26px; height:26px;}
nav.bottomnav button.active{color:var(--label);}
nav.bottomnav button.active svg{stroke:var(--label);}

/* Bottom sheet modal */
.sheet-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:30; opacity:0; pointer-events:none; transition:opacity .25s ease;
}
.sheet-overlay.show{opacity:1; pointer-events:auto;}
.sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:31; max-height:88vh; overflow-y:auto;
  background:var(--bg2); border-radius:20px 20px 0 0; padding:10px 20px calc(env(safe-area-inset-bottom) + 24px);
  transform:translateY(100%); transition:transform .38s cubic-bezier(0.32,0.72,0,1);
}
.sheet.show{transform:translateY(0);}
.sheet-handle{width:36px; height:5px; border-radius:3px; background:var(--bg4); margin:8px auto 14px;}
.sheet h2{font-size:22px; margin:0 0 2px; font-weight:700;}
.sheet .subline{font-size:14px; color:var(--label2); margin-bottom:16px;}
.ex-media{width:100%; height:190px; border-radius:14px; background:var(--bg3); display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:16px;}
.ex-media img{width:100%; height:100%; object-fit:cover;}
.ex-media svg{width:90px; height:90px; opacity:0.5;}
.weight-box{background:var(--bg3); border-radius:14px; padding:16px; margin-bottom:14px;}
.weight-box .wt-label{font-size:12px; color:var(--label2); text-transform:uppercase; letter-spacing:0.02em; margin-bottom:10px;}
.wt-stepper{display:flex; align-items:center; justify-content:center; gap:20px;}
.wt-btn{width:44px; height:44px; border-radius:50%; background:var(--bg4); border:none; color:var(--label); font-size:22px; font-weight:600;}
.wt-val{font-size:28px; font-weight:700; min-width:100px; text-align:center;}
.wt-save{width:100%; margin-top:14px; padding:12px; border-radius:12px; border:none; background:var(--blue); color:#fff; font-size:15px; font-weight:600;}
.wt-hist{margin-top:12px; font-size:13px; color:var(--label2);}
.wt-hist .h-row{display:flex; justify-content:space-between; padding:4px 0;}
.link-btn{
  display:block; text-align:center; width:100%; padding:13px; border-radius:12px; background:var(--fill);
  color:var(--blue); font-size:15px; font-weight:600; text-decoration:none; margin-bottom:14px;
}
.note-box{background:var(--bg3); border-radius:12px; padding:13px 14px; font-size:14px; color:var(--label2); margin-bottom:16px; line-height:1.4;}
.complete-btn{width:100%; padding:15px; border-radius:14px; border:none; font-size:16px; font-weight:700; background:var(--green); color:#fff;}
.complete-btn.done{background:var(--bg4); color:var(--label2);}
.rest-list, .run-card{padding:4px 2px;}
.rest-list .idea-row{padding:12px 2px;}
</style>
</head>
<body>

<header class="topbar">
  <h1 id="headerTitle">Hoy</h1>
  <div class="sub" id="headerSub"></div>
</header>

<main>
  <section class="tab-panel active" id="tab-hoy"></section>
  <section class="tab-panel" id="tab-gym"></section>
  <section class="tab-panel" id="tab-dieta"></section>
</main>

<nav class="bottomnav">
  <button data-tab="hoy" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1H9a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1h2.5a1 1 0 0 0 1-1v-9"/></svg>
    Hoy
  </button>
  <button data-tab="gym">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5v11M17.5 6.5v11M3 9.5v5M21 9.5v5M6.5 12h11"/></svg>
    Gym
  </button>
  <button data-tab="dieta">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v7a2 2 0 0 0 2 2v9M7 3v9M9 3v7M17 3c-1.7 0-3 2-3 5.5S15.3 13 17 13v9M17 3v18"/></svg>
    Dieta
  </button>
</nav>

<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="sheet" id="sheet"><div class="sheet-handle"></div><div id="sheetBody"></div></div>

<script>
(function(){
'use strict';

/* ---------- storage helpers ---------- */
function loadJSON(key, fallback){
  try{ const v = JSON.parse(localStorage.getItem(key)); return v===null||v===undefined ? fallback : v; }
  catch(e){ return fallback; }
}
function saveJSON(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
const TODAY = new Date();
const TODAY_KEY = dateKey(TODAY);

/* ---------- exercise data ---------- */
const EX_LOCAL_MEDIA = {
  'Press banca plano (barra)': 'ejercicios/Press banca plano (barra).gif',
  'Press inclinado (mancuernas)': 'ejercicios/Press inclinado (mancuernas).jpg',
  'Aperturas en polea baja': 'ejercicios/Aperturas en polea baja.jpg',
  'Press militar': 'ejercicios/Press militar.gif',
  'Elevaciones laterales': 'ejercicios/Elevaciones laterales.jpg',
  'Fondos en paralelas': 'ejercicios/Fondos en paralelas.jpg',
  'Extensiones tríceps en polea': 'ejercicios/Extensiones tríceps en polea.gif',
  'Dominadas': 'ejercicios/Dominadas.gif',
  'Remo con barra': 'ejercicios/Remo con barra.gif',
  'Jalón al pecho': 'ejercicios/Jalón al pecho.gif',
  'Remo en polea': 'ejercicios/Remo en polea.jpg',
  'Curl bíceps barra': 'ejercicios/Curl bíceps barra.jpg',
  'Curl martillo': 'ejercicios/Curl martillo.jpg',
  'Curl en polea baja': 'ejercicios/Curl en polea baja.gif',
  'Press banca inclinado (barra)': 'ejercicios/Press banca inclinado (barra).gif',
  'Press banca plano (mancuernas)': 'ejercicios/Press banca plano.jpg',
  'Aperturas en banco plano': 'ejercicios/Aperturas en banco plano.gif',
  'Pullover con mancuerna': 'ejercicios/Pullover con mancuerna.jpg',
  'Press hombro en máquina': 'ejercicios/Press hombro en máquina.jpg',
  'Elevaciones frontales': 'ejercicios/Elevaciones frontales.gif',
  'Tríceps francés': 'ejercicios/Tríceps francés.gif',
  'Sentadilla': 'ejercicios/Sentadilla.jpg',
  'Prensa 45°': 'ejercicios/Prensa 45°.jpg',
  'Extensión cuádriceps': 'ejercicios/Extensión cuádriceps.jpg',
  'Curl femoral': 'ejercicios/Curl femoral.gif',
  'Hip thrust': 'ejercicios/Hip thrust.png',
  'Elevaciones gemelo': 'ejercicios/Elevaciones gemelo.jpg',
  'Plancha abdominal': 'ejercicios/Plancha abdominal.jpg'
};
const EX_LINKS = {}; // filled lazily via searchLink()
function searchLink(name){
  return 'https://www.google.com/search?q=' + encodeURIComponent(name + ' ejercicio tecnica gym');
}
function stickFigureSVG(){
  return '<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">'+
    '<circle cx="50" cy="18" r="10"/>'+
    '<path d="M50 28v30M50 40l-22 14M50 40l22 14M50 58l-14 30M50 58l14 30"/>'+
    '</svg>';
}

function ex(name, sets, reps, note){ return {name, sets, reps, note}; }

const WORKOUTS = {
  0: { type:'rest', tagLabel:'Descanso', tag:'rest', name:'Día de descanso',
       activities:['Movilidad articular · 15 min','Paseo a paso ligero · 30 min','Stretching general · 10 min'] },
  1: { type:'gym', tagLabel:'Push A', tag:'gym', name:'Push A', muscles:'Pecho · Hombro · Tríceps',
       exercises:[
         ex('Press banca plano (barra)','4','6-8','Baja controlado 2-3s, no rebotes en el pecho.'),
         ex('Press inclinado (mancuernas)','4','8-10','Inclinación 30-45°, codos a 45° del torso.'),
         ex('Aperturas en polea baja','3','12-15','Aprieta pectoral arriba, no uses el hombro.'),
         ex('Press militar','4','8-10','Core apretado, no arquees lumbar en exceso.'),
         ex('Elevaciones laterales','4','12-15','Codos ligeramente flexionados, sube hasta la horizontal.'),
         ex('Fondos en paralelas','3','8-12','Inclina el torso ligeramente para más pecho.'),
         ex('Extensiones tríceps en polea','3','12-15','Codos fijos pegados al torso.')
       ]},
  2: { type:'run', tagLabel:'Running', tag:'run', name:'Running', duration:'30-45 min', note:'Ritmo suave, zona 2. Aumenta el fondo cardiovascular sin acumular fatiga.' },
  3: { type:'gym', tagLabel:'Pull', tag:'gym', name:'Pull', muscles:'Espalda · Bíceps',
       exercises:[
         ex('Dominadas','4','6-10','Si no llegas al número, usa asistencia o negativas.'),
         ex('Remo con barra','4','8-10','Torso a 45°, tira hacia el abdomen.'),
         ex('Jalón al pecho','3','10-12','Pecho arriba, tira con los codos hacia abajo.'),
         ex('Remo en polea','3','10-12','Espalda recta, aprieta escápulas al final.'),
         ex('Curl bíceps barra','3','10-12','Sin balanceo, codos fijos.'),
         ex('Curl martillo','3','10-12','Agarre neutro, trabaja braquial.'),
         ex('Curl en polea baja','3','12-15','Mantén tensión constante, no bloquees el codo.')
       ]},
  4: { type:'gym', tagLabel:'Push B', tag:'gym', name:'Push B', muscles:'Pecho · Hombro · Tríceps',
       exercises:[
         ex('Press banca inclinado (barra)','4','6-8','Barra a la altura de clavícula, control en la bajada.'),
         ex('Press banca plano (mancuernas)','4','8-10','Rango completo, mancuernas casi se tocan arriba.'),
         ex('Aperturas en banco plano','3','12-15','Ligera flexión de codo constante.'),
         ex('Pullover con mancuerna','3','12-15','Estira bien el dorsal y serrato, respira profundo.'),
         ex('Press hombro en máquina','3','10-12','Recorrido controlado, sin bloquear el codo arriba.'),
         ex('Elevaciones frontales','3','12-15','Sube hasta la altura del hombro, sin impulso.'),
         ex('Tríceps francés','3','12-15','Codos apuntando al techo, fijos.')
       ]},
  5: { type:'gym', tagLabel:'Legs', tag:'gym', name:'Legs', muscles:'Pierna · Glúteo · Abdomen',
       exercises:[
         ex('Sentadilla','4','6-8','Profundidad completa, rodillas en línea con los pies.'),
         ex('Prensa 45°','4','10-12','Pies a la anchura de hombros, no bloquees rodillas.'),
         ex('Extensión cuádriceps','3','12-15','Aprieta arriba 1 segundo.'),
         ex('Curl femoral','3','12-15','Control en la fase excéntrica.'),
         ex('Hip thrust','4','10-12','Aprieta glúteo al máximo arriba, barbilla metida.'),
         ex('Elevaciones gemelo','4','15-20','Rango completo, pausa arriba.'),
         ex('Plancha abdominal','3','45-60 s','Cadera neutra, no la dejes caer.')
       ]},
  6: { type:'run', tagLabel:'Running', tag:'run', name:'Running largo', duration:'45-60 min', note:'Carrera larga a ritmo cómodo, hidrátate bien antes y después.' }
};
const DAY_NAMES = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];

/* ---------- exDone / suppDone / exWeights ---------- */
function getExDone(k){ return loadJSON('exDone', {})[k] || {}; }
function toggleExDone(k, idx){
  const all = loadJSON('exDone', {});
  if(!all[k]) all[k] = {};
  all[k][idx] = !all[k][idx];
  saveJSON('exDone', all);
  return all[k][idx];
}
function getSuppDone(k){ return loadJSON('suppDone', {})[k] || {}; }
function toggleSuppDone(k, idx){
  const all = loadJSON('suppDone', {});
  if(!all[k]) all[k] = {};
  all[k][idx] = !all[k][idx];
  saveJSON('suppDone', all);
  return all[k][idx];
}
function getWeights(name){ return loadJSON('exWeights', {})[name] || []; }
function saveWeight(name, weight){
  const all = loadJSON('exWeights', {});
  if(!all[name]) all[name] = [];
  const idx = all[name].findIndex(e => e.date === TODAY_KEY);
  if(idx >= 0) all[name][idx].weight = weight;
  else all[name].push({date: TODAY_KEY, weight});
  if(all[name].length > 30) all[name] = all[name].slice(-30);
  saveJSON('exWeights', all);
}
function lastWeight(name){
  const w = getWeights(name);
  return w.length ? w[w.length-1].weight : null;
}

/* ================= TAB: HOY ================= */
function fastWindowState(now){
  const mins = now.getHours()*60 + now.getMinutes();
  const eatStart = 12*60+30, eatEnd = 21*60;
  if(mins >= eatStart && mins < eatEnd){
    const remaining = eatEnd - mins;
    return { open:true, progress: (mins-eatStart)/(eatEnd-eatStart), remaining };
  }
  const fastTotal = (24*60) - eatEnd + eatStart; // 930
  let elapsed;
  if(mins >= eatEnd) elapsed = mins - eatEnd;
  else elapsed = (24*60 - eatEnd) + mins;
  return { open:false, progress: elapsed/fastTotal, remaining: fastTotal - elapsed };
}
function fmtHM(mins){
  const h = Math.floor(mins/60), m = mins%60;
  return h+'h '+pad(m)+'m';
}
function renderHoy(){
  const now = new Date();
  const state = fastWindowState(now);
  const circumference = 2*Math.PI*52;
  const offset = state.open ? 0 : circumference*(1-state.progress);
  const weight = getUserWeight();
  const macros = computeMacros(weight);

  let html = '';
  html += '<div class="card ring-card">';
  html += '<div class="ring-wrap"><svg width="180" height="180" viewBox="0 0 120 120">';
  html += '<circle class="ring-bg" cx="60" cy="60" r="52"/>';
  html += '<circle class="ring-fg" cx="60" cy="60" r="52" stroke-dasharray="'+circumference+'" stroke-dashoffset="'+offset+'"/>';
  html += '</svg><div class="ring-center">';
  if(state.open){
    html += '<div class="big">'+fmtHM(state.remaining)+'</div><div class="small">hasta el cierre de la ventana</div>';
  } else {
    html += '<div class="big">'+fmtHM(state.remaining)+'</div><div class="small">para romper el ayuno</div>';
  }
  html += '</div></div>';
  html += '<div class="ring-status'+(state.open?' open':'')+'">'+(state.open ? 'Ventana abierta' : 'Ayunando')+'</div>';
  html += '</div>';

  html += '<div class="cal-strip">';
  for(let i=0;i<7;i++){
    const d = new Date(now); d.setDate(now.getDate()+i);
    const wo = WORKOUTS[d.getDay()];
    html += '<div class="cal-day'+(i===0?' today':'')+'">';
    html += '<div class="dname">'+DAY_NAMES[d.getDay()]+'</div>';
    html += '<div class="dnum">'+d.getDate()+'</div>';
    html += '<div class="cal-tag tag-'+wo.tag+'"></div>';
    html += '</div>';
  }
  html += '</div>';

  const wo = WORKOUTS[now.getDay()];
  html += '<div class="card wo-preview-card" id="hoyWorkoutCard" style="cursor:pointer;">';
  html += '<div class="wo-preview"><div>';
  if(wo.type==='gym'){
    const done = getExDone(TODAY_KEY);
    const total = wo.exercises.length;
    const count = wo.exercises.filter((_,i)=>done[i]).length;
    html += '<div class="name">'+wo.name+'</div><div class="muscles">'+wo.muscles+'</div>';
    html += '</div><div class="chev">›</div></div>';
    html += '<div class="progress-bar"><div style="width:'+Math.round(count/total*100)+'%"></div></div>';
    html += '<div class="progress-label">'+count+' / '+total+' ejercicios completados</div>';
  } else if(wo.type==='run'){
    html += '<div class="name">'+wo.name+'</div><div class="muscles">'+wo.duration+'</div>';
    html += '</div><div class="chev">›</div></div>';
  } else {
    html += '<div class="name">'+wo.name+'</div><div class="muscles">Movilidad · Paseo · Stretching</div>';
    html += '</div><div class="chev">›</div></div>';
  }
  html += '</div>';

  html += '<div class="section-title">Nutrición</div>';
  html += '<div class="card">';
  html += '<div class="macro-row">';
  html += '<div class="macro-box"><div class="val">'+macros.kcal+'</div><div class="lbl">kcal / día</div></div>';
  html += '<div class="macro-box"><div class="val">'+macros.protein+'g</div><div class="lbl">proteína</div></div>';
  html += '</div>';
  html += '<div class="weight-tap" id="weightTap">Peso actual: '+weight+' kg · toca para actualizar</div>';
  html += '</div>';

  html += '<div class="card">';
  html += '<div class="list-row"><div class="t">12:30</div><div class="n">Almuerzo</div></div>';
  html += '<div class="list-row"><div class="t">17:00</div><div class="n">Merienda</div></div>';
  html += '<div class="list-row"><div class="t">20:30</div><div class="n">Cena</div></div>';
  html += '</div>';

  html += '<div class="section-title">Suplementos</div>';
  const sdone = getSuppDone(TODAY_KEY);
  const supps = [['Ω3','Omega-3'],['D','Vit. D'],['Cr','Creatina'],['Mg','Mg+Zn']];
  html += '<div class="card"><div class="supp-row">';
  supps.forEach((s,i)=>{
    html += '<div class="supp-item"><div class="supp-circle'+(sdone[i]?' done':'')+'" data-supp-idx="'+i+'">'+s[0]+'</div><div class="slbl">'+s[1]+'</div></div>';
  });
  html += '</div></div>';

  document.getElementById('tab-hoy').innerHTML = html;

  document.getElementById('hoyWorkoutCard').addEventListener('click', () => setTab('gym'));
  document.querySelectorAll('#tab-hoy .supp-circle').forEach(el => {
    el.addEventListener('click', () => {
      const done = toggleSuppDone(TODAY_KEY, el.dataset.suppIdx);
      el.classList.toggle('done', done);
    });
  });
  document.getElementById('weightTap').addEventListener('click', () => {
    const val = prompt('Peso actual (kg):', getUserWeight());
    if(val === null) return;
    const num = parseFloat(val.replace(',','.'));
    if(!isNaN(num) && num > 0){ setUserWeight(num); renderHoy(); }
  });
}

/* ================= TAB: GYM ================= */
function renderGym(){
  const now = new Date();
  const wo = WORKOUTS[now.getDay()];
  let html = '';

  if(wo.type === 'rest'){
    const done = getExDone(TODAY_KEY);
    html += '<div class="card"><div class="wo-preview"><div><div class="name">'+wo.name+'</div><div class="muscles">Recuperación activa</div></div></div>';
    html += '<div class="rest-list" style="margin-top:8px;">';
    wo.activities.forEach((a,i)=>{
      html += '<div class="idea-row" style="align-items:center;">';
      html += '<div class="ex-circle'+(done[i]?' done':'')+'" data-rest-idx="'+i+'" style="cursor:pointer;"></div>';
      html += '<div class="it">'+a+'</div></div>';
    });
    html += '</div></div>';
  } else if(wo.type === 'run'){
    const done = getExDone(TODAY_KEY);
    html += '<div class="card run-card">';
    html += '<div class="name" style="font-size:19px;font-weight:700;">'+wo.name+'</div>';
    html += '<div class="muscles" style="color:var(--label2);font-size:13px;margin-top:2px;">'+wo.duration+'</div>';
    html += '<div class="note-box" style="margin-top:14px;">'+wo.note+'</div>';
    html += '<div class="ex-circle'+(done[0]?' done':'')+'" id="runDone" style="cursor:pointer; margin:0 auto;"></div>';
    html += '<div style="text-align:center; font-size:12px; color:var(--label2); margin-top:8px;">Marcar carrera completada</div>';
    html += '</div>';
  } else {
    const done = getExDone(TODAY_KEY);
    const total = wo.exercises.length;
    const count = wo.exercises.filter((_,i)=>done[i]).length;
    html += '<div class="card"><div class="name" style="font-size:20px;font-weight:700;">'+wo.name+'</div>';
    html += '<div class="muscles" style="color:var(--label2);font-size:13px;margin-top:2px;">'+wo.muscles+'</div>';
    html += '<div class="progress-bar"><div style="width:'+Math.round(count/total*100)+'%"></div></div>';
    html += '<div class="progress-label">'+count+' / '+total+' ejercicios completados</div>';
    html += '</div><div class="card" style="padding:6px 16px;">';
    wo.exercises.forEach((e,i)=>{
      const lw = lastWeight(e.name);
      html += '<div class="ex-row" data-ex-idx="'+i+'">';
      html += '<div class="ex-circle'+(done[i]?' done':'')+'" data-ex-toggle="'+i+'"></div>';
      html += '<div class="ex-info"><div class="en">'+e.name+'</div><div class="es">'+e.sets+' series × '+e.reps+'</div>';
      if(lw !== null) html += '<div class="ew">Último: '+lw+' kg</div>';
      html += '</div><div class="chev">›</div></div>';
    });
    html += '</div>';
  }

  document.getElementById('tab-gym').innerHTML = html;

  if(wo.type === 'rest'){
    document.querySelectorAll('#tab-gym [data-rest-idx]').forEach(el => {
      el.addEventListener('click', () => {
        const done = toggleExDone(TODAY_KEY, el.dataset.restIdx);
        el.classList.toggle('done', done);
      });
    });
  } else if(wo.type === 'run'){
    document.getElementById('runDone').addEventListener('click', () => {
      const done = toggleExDone(TODAY_KEY, 0);
      document.getElementById('runDone').classList.toggle('done', done);
    });
  } else {
    document.querySelectorAll('#tab-gym .ex-row').forEach(row => {
      const idx = parseInt(row.dataset.exIdx, 10);
      row.addEventListener('click', (evt) => {
        if(evt.target.dataset.exToggle !== undefined) return;
        openExerciseModal(wo, idx);
      });
    });
    document.querySelectorAll('#tab-gym [data-ex-toggle]').forEach(el => {
      el.addEventListener('click', (evt) => {
        evt.stopPropagation();
        const idx = el.dataset.exToggle;
        const done = toggleExDone(TODAY_KEY, idx);
        el.classList.toggle('done', done);
        renderGym();
      });
    });
  }
}

function openExerciseModal(wo, idx){
  const e = wo.exercises[idx];
  const done = getExDone(TODAY_KEY)[idx];
  const last = lastWeight(e.name);
  let currentWeight = last !== null ? last : 20;
  const history = getWeights(e.name).slice(-3).reverse();

  let media = '';
  if(EX_LOCAL_MEDIA[e.name]){
    media = '<img src="'+EX_LOCAL_MEDIA[e.name]+'" onerror="this.parentElement.innerHTML=\''+stickFigureSVG().replace(/'/g,"\\'")+'\'">';
  } else {
    media = stickFigureSVG();
  }

  let html = '';
  html += '<h2>'+e.name+'</h2>';
  html += '<div class="subline">'+e.sets+' series × '+e.reps+' repeticiones</div>';
  html += '<div class="ex-media">'+media+'</div>';
  html += '<div class="weight-box">';
  html += '<div class="wt-label">Peso de hoy</div>';
  html += '<div class="wt-stepper"><button class="wt-btn" id="wtMinus">−</button><div class="wt-val" id="wtVal">'+currentWeight+' kg</div><button class="wt-btn" id="wtPlus">+</button></div>';
  html += '<button class="wt-save" id="wtSave">Guardar peso de hoy</button>';
  if(history.length){
    html += '<div class="wt-hist">';
    history.forEach(h => { html += '<div class="h-row"><span>'+h.date+'</span><span>'+h.weight+' kg</span></div>'; });
    html += '</div>';
  }
  html += '</div>';
  html += '<a class="link-btn" href="'+searchLink(e.name)+'" target="_blank" rel="noopener">Ver ejercicio</a>';
  html += '<div class="note-box">'+e.note+'</div>';
  html += '<button class="complete-btn'+(done?' done':'')+'" id="completeBtn">'+(done ? 'Marcar como pendiente' : 'Marcar como completado')+'</button>';

  openSheet(html);

  document.getElementById('wtMinus').addEventListener('click', () => {
    currentWeight = Math.max(0, currentWeight - 2.5);
    document.getElementById('wtVal').textContent = currentWeight + ' kg';
  });
  document.getElementById('wtPlus').addEventListener('click', () => {
    currentWeight += 2.5;
    document.getElementById('wtVal').textContent = currentWeight + ' kg';
  });
  document.getElementById('wtSave').addEventListener('click', () => {
    saveWeight(e.name, currentWeight);
    const btn = document.getElementById('wtSave');
    btn.textContent = 'Guardado ✓';
    setTimeout(()=>{ btn.textContent = 'Guardar peso de hoy'; }, 1200);
  });
  document.getElementById('completeBtn').addEventListener('click', () => {
    const nowDone = toggleExDone(TODAY_KEY, idx);
    if(nowDone && currentWeight > 0) saveWeight(e.name, currentWeight);
    closeSheet();
    renderGym();
  });
}
